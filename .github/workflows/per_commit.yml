name: Per Commit (Ubuntu)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-linux:
    name: Build and Smoke Test on Ubuntu
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and update submodules
        run: |
          git config -f .gitmodules submodule.scratch/ns-3-ub-tools.url https://github.com/netisim-dev-group/ns-3-ub-tools.git
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            libgsl-dev \
            libxml2-dev \
            ca-certificates

      - name: Install Python dependencies for ns-3-ub-tools
        run: |
          python3 -m pip install --user -r scratch/ns-3-ub-tools/requirements.txt

      - name: Configure and build (Quick Start)
        run: |
          ./ns3 configure --enable-asserts --enable-examples --enable-tests --disable-werror -d release -G Ninja
          ./ns3 build

      - name: Run smoke scenario (Quick Start)
        run: |
          ./ns3 run 'scratch/ub-quick-example scratch/2nodes_single-tp'
